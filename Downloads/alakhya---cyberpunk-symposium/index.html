
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alakhya | The Cyberpunk Symposium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;500;600;700;800;900&family=Sora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-obsidian: #050505;
            --color-charcoal: #1a1f26;
            --color-cyan: #00F0FF;
            --color-violet: #7000FF;
            --color-amber: #FFB000;
            --color-emerald: #00E096;
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.1);
            z-index: 50;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }
        .cyber-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        body {
            background-color: var(--color-obsidian);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, .font-display {
            font-family: 'Orbitron', sans-serif;
        }
        .font-sora {
            font-family: 'Sora', sans-serif;
        }
        .text-neon {
            text-shadow: 0 0 5px #00FF41, 0 0 10px #00FF41, 0 0 20px #00FF41;
        }
        .text-cyan-glow {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .border-neon {
            box-shadow: 0 0 5px #00FF41, inset 0 0 5px #00FF41;
        }
        .glitch-hover:hover {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
<script type="importmap">

}

</head>

</html>
